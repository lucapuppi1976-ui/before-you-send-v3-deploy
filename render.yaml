services:
  - type: web
    name: bys-v3-public
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: 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
        sync: false
      - key: BYS_PUBLIC_DEPLOY
        value: "true"
      - key: PYTHON_VERSION
        value: "3.14.3"
