services:
  - type: web
    name: bys-v3-public
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: BYS_PUBLIC_DEPLOY
        value: "true"
      - key: PYTHON_VERSION
        value: "3.14.3"
